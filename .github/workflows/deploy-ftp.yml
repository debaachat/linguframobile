name: Deploy Web To Hosting (FTP)

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'bootstrap/**'
      - 'config/**'
      - 'database/**'
      - 'lang/**'
      - 'Modules/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'storage/**'
      - 'tests/**'
      - '.env.example'
      - '.gitignore'
      - '.htaccess'
      - 'artisan'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'vite-module-loader.js'
      - 'server.php'
      - 'tailwind.config.js'
      - 'version.json'
      - '.github/workflows/deploy-ftp.yml'
  workflow_dispatch:

concurrency:
  group: ftp-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          server-dir: ${{ secrets.FTP_TARGET_DIR || '/' }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/.env
            **/.env.*
            **/storage/**
            **/bootstrap/cache/**
            **/mobile/**
            **/tmp/**
            **/output/**
            **/*.zip
            **/public/uploads/**
